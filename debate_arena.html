<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Debate Arena - Final Demo</title>
<style>
body { margin:0; font-family: Arial; background:#0b1220; color:#fff; }
header { text-align:center; padding:18px; font-size:26px; font-weight:bold; }
.sub { text-align:center; opacity:0.7; margin-bottom:10px; }
.container { max-width:1000px; margin:auto; padding:20px; }
button { width:100%; padding:12px; border-radius:10px; border:none; background:#6366f1; color:white; cursor:pointer; font-size:16px; margin-top:10px; }.controls { display:grid; grid-template-columns:1fr; gap:10px; margin-top:10px; } select { width:100%; padding:10px; border-radius:8px; border:none; margin-top:5px; }

.debate { display:flex; gap:12px; margin-top:20px; }

.column { flex:1; background:#111a2e; border-radius:12px; padding:10px; display:flex; flex-direction:column; }

.aiHeader { display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid rgba(255,255,255,0.1); } .avatar { width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold; } .ai1Avatar { background:#3b82f6; } .ai2Avatar { background:#ef4444; }

.aiTitle { font-weight:bold; } .aiSub { font-size:12px; opacity:0.6; }

.chat { padding:10px; height:340px; overflow-y:auto; }

.msg { padding:10px; border-radius:10px; margin-bottom:10px; font-size:14px; line-height:1.35; } .ai1Msg { background:#1e3a8a; } .ai2Msg { background:#7f1d1d; }

.judge { margin-top:15px; background:#0f172a; padding:12px; border-radius:10px; font-size:14px; border:1px solid rgba(255,255,255,0.1); }

.typing { opacity:0.6; font-style:italic; } </style>

</head>
<body><header>⚔️ AI Debate Arena</header>
<div class="sub">Discussione strutturata tra due intelligenze artificiali</div><div class="container"><p><strong>Scegli argomento:</strong></p>
<select id="topic">
  <option value="ukraine">Guerra in Ucraina: negoziare o continuare il conflitto?</option>
  <option value="ai">Regolamentazione dell’AI: libertà totale o controllo severo?</option>
</select><button onclick="runDemo()">▶ Avvia Dibattito</button>

<div class="debate">  <div class="column">
    <div class="aiHeader">
      <div class="avatar ai1Avatar">A1</div>
      <div>
        <div class="aiTitle">AI 1</div>
        <div class="aiSub">Posizione strategica</div>
      </div>
    </div>
    <div class="chat" id="ai1"></div>
  </div>  <div class="column">
    <div class="aiHeader">
      <div class="avatar ai2Avatar">A2</div>
      <div>
        <div class="aiTitle">AI 2</div>
        <div class="aiSub">Posizione critica/alternativa</div>
      </div>
    </div>
    <div class="chat" id="ai2"></div>
  </div></div><div class="judge" id="judge"></div></div><script>

function wait(ms){ return new Promise(r => setTimeout(r, ms)); }

async function runDemo(){

  const topic = document.getElementById("topic").value;
  const ai1 = document.getElementById("ai1");
  const ai2 = document.getElementById("ai2");
  const judge = document.getElementById("judge");

  ai1.innerHTML = "";
  ai2.innerHTML = "";
  judge.innerHTML = "";

  let a1 = [];
  let a2 = [];

  if(topic === "ukraine"){
    a1 = [
      "Continuare il supporto militare è necessario: una pace senza deterrenza premia l’aggressione e indebolisce il diritto internazionale.",
      "Il rischio di escalation esiste, ma la storia mostra che le concessioni senza condizioni spesso portano a nuovi conflitti più gravi.",
      "Una pace stabile richiede equilibrio di forza, non solo diplomazia idealistica."
    ];

    a2 = [
      "Ogni mese di guerra aumenta vittime civili e distruzione infrastrutturale irreversibile: il costo umano è già insostenibile.",
      "La deterrenza militare non garantisce sicurezza, ma spesso prolunga conflitti senza una soluzione reale.",
      "Le negoziazioni, anche imperfette, possono interrompere spirali di violenza prima che diventino incontrollabili."
    ];
  }

  if(topic === "ai"){
    a1 = [
      "Una regolamentazione eccessiva dell’AI potrebbe frenare innovazione e competitività globale, lasciando spazio ad altri paesi meno vincolati.",
      "Il rischio deve essere gestito con auto-regolazione del settore piuttosto che con leggi rigide e lente.",
      "La libertà tecnologica è fondamentale per lo sviluppo futuro dell’umanità."
    ];

    a2 = [
      "Senza regole chiare, l’AI può amplificare disinformazione, disuguaglianze e rischi sistemici difficili da controllare.",
      "L’auto-regolazione ha già fallito in molti settori tecnologici del passato.",
      "Serve un equilibrio tra innovazione e sicurezza pubblica, non crescita incontrollata."
    ];
  }

  for(let i=0;i<a1.length;i++){

    ai1.innerHTML += `<div class='msg ai1Msg'>${a1[i]}</div>`;
    ai1.scrollTop = ai1.scrollHeight;

    await wait(1600);

    ai2.innerHTML += `<div class='msg ai2Msg'>${a2[i]}</div>`;
    ai2.scrollTop = ai2.scrollHeight;

    await wait(1600);
  }

  judge.innerHTML = "🧠 <b>Giudice AI:</b> Il confronto mostra due visioni coerenti: una orientata alla stabilità strategica e una alla riduzione immediata del rischio. La posizione più convincente dipende dal peso dato a lungo termine vs impatto umano immediato.";
}

</script></body>
</html>
