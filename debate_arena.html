<!DOCTYPE html><html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Debate Arena Multi Mode</title>
<style>
body { margin:0; font-family:Arial; background:#0b1220; color:#fff; }
header { text-align:center; padding:18px; font-size:26px; font-weight:bold; }
.container { max-width:1000px; margin:auto; padding:20px; }
select, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:none; }
button { background:#6366f1; color:white; cursor:pointer; }
.debate { display:flex; gap:10px; margin-top:20px; }
.col { flex:1; background:#111a2e; padding:10px; border-radius:10px; height:350px; overflow:auto; }
.msg { margin-bottom:10px; padding:8px; border-radius:8px; font-size:14px; }
.ai1 { background:#1e3a8a; }
.ai2 { background:#7f1d1d; }
.judge { margin-top:15px; padding:10px; background:#0f172a; border-radius:10px; }
</style>
</head>
<body><header>⚔️ AI Debate Arena</header><div class="container"><label>Modalità</label> <select id="mode">

  <option value="classic">Dibattito classico</option>
  <option value="famous">Pensieri famosi</option>
  <option value="trial">Processo (Accusa vs Difesa)</option>
</select><label>Argomento</label> <select id="topic">

  <option>Regolamentazione AI</option>
  <option>Social media fanno male?</option>
  <option>Smart working vs ufficio</option>
</select><label>AI 1 stile</label> <select id="style1">

  <option>logico</option>
  <option>strategico</option>
  <option>critico</option>
</select><label>AI 2 stile</label> <select id="style2">

  <option>emotivo</option>
  <option>analitico</option>
  <option>pessimista</option>
</select><button onclick="start()">▶ Avvia</button>

<div class="debate">
  <div class="col" id="ai1"></div>
  <div class="col" id="ai2"></div>
</div><div class="judge" id="judge"></div></div><script>

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function start(){

  const mode = document.getElementById("mode").value;
  const topic = document.getElementById("topic").value;
  const style1 = document.getElementById("style1").value;
  const style2 = document.getElementById("style2").value;

  const ai1 = document.getElementById("ai1");
  const ai2 = document.getElementById("ai2");
  const judge = document.getElementById("judge");

  ai1.innerHTML = "";
  ai2.innerHTML = "";
  judge.innerHTML = "";

  let a1 = [];
  let a2 = [];

  if(mode === "classic"){
    a1 = [
      `(${style1}) La regolamentazione dell'AI è necessaria per evitare rischi sistemici e sociali.`,
      `L'assenza di regole può portare a disinformazione e perdita di controllo.`,
      `Un equilibrio tra innovazione e sicurezza è fondamentale.`
    ];
    a2 = [
      `(${style2}) Troppe regole soffocano innovazione e progresso tecnologico.`,
      `La libertà permette sviluppo più rapido e competitivo.`,
      `Il mercato può autoregolarsi meglio dei governi.`
    ];
  }

  if(mode === "famous"){
    a1 = [
      `(${style1}) L'individuo deve superare le regole imposte dalla società per evolversi.`,
      `Le limitazioni collettive soffocano il potenziale umano.`,
      `Il progresso nasce dalla rottura degli schemi.`
    ];
    a2 = [
      `(${style2}) Le regole esistono per garantire equilibrio e convivenza.`,
      `Senza limiti si crea caos e instabilità.`,
      `La società deve proteggere il bene comune.`
    ];
  }

  if(mode === "trial"){
    a1 = [
      `(${style1}) L'accusa sostiene che le prove indicano responsabilità chiara.`,
      `Le azioni dimostrano intenzionalità e consapevolezza.`,
      `I fatti non lasciano spazio a dubbi significativi.`
    ];
    a2 = [
      `(${style2}) La difesa evidenzia mancanza di prove concrete.`,
      `Esistono alternative plausibili ai fatti presentati.`,
      `Il dubbio ragionevole impedisce una condanna certa.`
    ];
  }

  for(let i=0;i<a1.length;i++){

    ai1.innerHTML += `<div class='msg ai1'>${a1[i]}</div>`;
    ai1.scrollTop = ai1.scrollHeight;
    await wait(1500);

    ai2.innerHTML += `<div class='msg ai2'>${a2[i]}</div>`;
    ai2.scrollTop = ai2.scrollHeight;
    await wait(1500);
  }

  judge.innerHTML = "🧠 <b>Giudice:</b> Il confronto mostra due visioni contrastanti ma coerenti. La valutazione finale dipende dal peso attribuito a logica, rischio e valori.";

}

</script></body>
</html>
